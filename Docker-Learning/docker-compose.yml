services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: prac-postgres
    environment:
      POSTGRES_DB: pracdb
      POSTGRES_USER: pracuser
      POSTGRES_PASSWORD: pracpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pracuser -d pracdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      no_cache: true
    container_name: prac-server
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pracdb
      DB_USER: pracuser
      DB_PASSWORD: pracpassword
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: prac-client
    ports:
      - "3001:80"
    depends_on:
      - server

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prac-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
